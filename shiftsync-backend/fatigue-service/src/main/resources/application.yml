spring:
  application:
    name: fatigue-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USER:shiftsync}
    password: ${DB_PASSWORD:shiftsync_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8085}

app:
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  fatigue:
    model-version: "1.0.0"
  clients:
    attendance-service:
      url: ${ATTENDANCE_SERVICE_URL:http://localhost:8084}
    shift-service:
      url: ${SHIFT_SERVICE_URL:http://localhost:8083}
