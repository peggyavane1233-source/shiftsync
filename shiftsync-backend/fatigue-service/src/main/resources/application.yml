spring:
  application:
    name: fatigue-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USERNAME:${DB_USER:shiftsync}}
    password: ${DB_PASSWORD:shiftsync_pass}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history_fatigue

server:
  port: ${PORT:8085}

app:
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  fatigue:
    model-version: "1.0.0"
  clients:
    attendance-service:
      url: ${ATTENDANCE_SERVICE_URL:http://localhost:8084}
    shift-service:
      url: ${SHIFT_SERVICE_URL:http://localhost:8083}
