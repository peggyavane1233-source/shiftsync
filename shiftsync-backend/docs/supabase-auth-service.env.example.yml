# Example: auth-service only (compose / process env)
# Fill SUPABASE_* from dashboard, then start THIS service first with FLYWAY_ENABLED=true.
#
# SUPABASE_DB_PASSWORD comes from:
#   Dashboard → Project Settings → Database → Database password
# It is set when the project is created (or reset there). It is NOT:
#   - your Supabase account / dashboard login password
#   - the anon / publishable API key
#   - the sb_secret_ / service_role API key

# auth-service:
#   environment:
#     SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF}
#     SUPABASE_REGION: ${SUPABASE_REGION}
#     SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
#     DB_URL: jdbc:postgresql://aws-0-${SUPABASE_REGION}.pooler.supabase.com:5432/postgres?sslmode=require
#     DB_USERNAME: postgres.${SUPABASE_PROJECT_REF}
#     DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
#     HIKARI_MAX_POOL_SIZE: "3"
#     HIKARI_MIN_IDLE: "1"
#     FLYWAY_ENABLED: "true"
