spring:
  application:
    name: attendance-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USERNAME:${DB_USER:shiftsync}}
    password: ${DB_PASSWORD:shiftsync_pass}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history_attendance
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8084}

app:
  geofence:
    enabled: false
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  clients:
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8082}
    shift-service:
      url: ${SHIFT_SERVICE_URL:http://localhost:8083}
    fatigue-service:
      url: ${FATIGUE_SERVICE_URL:http://localhost:8085}
