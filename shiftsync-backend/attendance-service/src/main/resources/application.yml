spring:
  application:
    name: attendance-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USER:shiftsync}
    password: ${DB_PASSWORD:shiftsync_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8084}

app:
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  clients:
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8082}
    shift-service:
      url: ${SHIFT_SERVICE_URL:http://localhost:8083}
    fatigue-service:
      url: ${FATIGUE_SERVICE_URL:http://localhost:8085}
