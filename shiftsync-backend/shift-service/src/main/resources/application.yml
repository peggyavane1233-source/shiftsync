server:
  port: 8083

spring:
  application:
    name: shift-service
  datasource:
    url: jdbc:postgresql://localhost:5432/shiftsync_db
    username: shiftsync
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

