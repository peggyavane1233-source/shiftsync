server:
  port: 8083

spring:
  application:
    name: shift-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USERNAME:shiftsync}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    table: flyway_schema_history_shift
