spring:
  application:
    name: reporting-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USERNAME:${DB_USER:shiftsync}}
    password: ${DB_PASSWORD:shiftsync_pass}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history_reporting
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 20

server:
  port: ${PORT:8087}

app:
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  clients:
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8081}
    shift-service:
      url: ${SHIFT_SERVICE_URL:http://localhost:8082}
    attendance-service:
      url: ${ATTENDANCE_SERVICE_URL:http://localhost:8084}
    fatigue-service:
      url: ${FATIGUE_SERVICE_URL:http://localhost:8085}
    emergency-service:
      url: ${EMERGENCY_SERVICE_URL:http://localhost:8086}
