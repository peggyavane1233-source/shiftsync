spring:
  application:
    name: emergency-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shiftsync_db}
    username: ${DB_USER:shiftsync}
    password: ${DB_PASSWORD:shiftsync_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8086}

app:
  internal-secret: ${INTERNAL_SECRET:dev-internal-secret-for-gateway}
  clients:
    attendance-service:
      url: ${ATTENDANCE_SERVICE_URL:http://localhost:8084}
